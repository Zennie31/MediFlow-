<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediFlow - Doctor Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #e3f6f0 0%, #eafaf5 50%, #e6f5f4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background: #f7fbfa;
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 50px rgba(15, 60, 50, 0.12);
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-header .logo-img {
            height: 56px;
            width: auto;
            margin-bottom: 12px;
        }
        .login-header h1 {
            font-size: 26px;
            font-weight: 800;
            color: #0f2f28;
            letter-spacing: -0.3px;
            margin-bottom: 8px;
        }
        .login-header p { color: #64748b; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #0f2f28;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.2s;
            background: #eef1fb;
            color: #0f2f28;
        }
        .form-group input:focus {
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        .form-group input::placeholder { color: #94a3b8; }
        .error-message {
            text-align: center;
            color: #dc2626;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
            display: none;
        }
        .error-message.show { display: block; }
        .login-btn {
            width: 100%;
            padding: 15px;
            background: #16a97a;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }
        .login-btn:hover { background: #129266; }
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .login-btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        .login-btn.loading .spinner { display: block; }
        .login-btn.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .login-footer {
            text-align: center;
            margin-top: 24px;
        }
        .login-footer a {
            font-size: 14px;
            font-weight: 600;
            color: #2563eb;
            text-decoration: none;
        }
        .login-footer a:hover { text-decoration: underline; }
        @media (max-width: 480px) {
            .login-container { padding: 32px 24px; border-radius: 16px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="mediflow_logo.png" alt="MediFlow" class="logo-img" />
            <h1>Welcome to MediFlow</h1>
            <p>Please enter your credentials to continue</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Username</label>
                <input
                    type="text"
                    id="username"
                    placeholder="Enter your username"
                    required
                    autofocus
                />
            </div>

            <div class="form-group">
                <label>Password</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    required
                />
            </div>

            <div class="error-message" id="errorMessage">
                <span id="errorText">Invalid username or password. Please try again.</span>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <span class="btn-text">Login</span>
                <span class="spinner"></span>
            </button>
        </form>

        <div class="login-footer">
            <a href="#">Visit MediFlow Homepage &rarr;</a>
        </div>
    </div>

    <script>
        const VALID_CREDENTIALS = {
            'dr.weiming': { password: 'password123', name: 'Dr Wei Ming Lim', role: 'Physician', id: 'D001' },
            'dr.junhao': { password: 'password123', name: 'Dr Jun Hao Hassan', role: 'Physician', id: 'D002' },
            'dr.rajan': { password: 'password123', name: 'Dr Rajan Kumar', role: 'Physician', id: 'D003' },
            'dr.arjun': { password: 'password123', name: 'Dr Arjun Chen', role: 'Physician', id: 'D004' },
            'dr.farid': { password: 'password123', name: 'Dr Farid Chen', role: 'Physician', id: 'D005' },
            'dr.hafiz': { password: 'password123', name: 'Dr Hafiz Goh', role: 'Physician', id: 'D006' },
            'dr.choon': { password: 'password123', name: 'Dr Choon Hock Lim', role: 'Physician', id: 'D007' },
            'dr.boonkiat': { password: 'password123', name: 'Dr Boon Kiat Ismail', role: 'Physician', id: 'D008' },
            'dr.vishal': { password: 'password123', name: 'Dr Vishal Lee', role: 'Physician', id: 'D009' },
            'dr.pradeep': { password: 'password123', name: 'Dr Pradeep Lim', role: 'Physician', id: 'D010' },
            'dr.ahmad': { password: 'password123', name: 'Dr Ahmad Raja', role: 'Physician', id: 'D011' },
            'dr.rizal': { password: 'password123', name: 'Dr Rizal Chua', role: 'Physician', id: 'D012' },
            'dr.meiling': { password: 'password123', name: 'Dr Mei Ling Ismail', role: 'Physician', id: 'D013' },
            'dr.huiying': { password: 'password123', name: 'Dr Hui Ying Hassan', role: 'Physician', id: 'D014' },
            'dr.priya': { password: 'password123', name: 'Dr Priya Ismail', role: 'Physician', id: 'D015' },
            'dr.divya': { password: 'password123', name: 'Dr Divya Hassan', role: 'Physician', id: 'D016' },
            'dr.nurul': { password: 'password123', name: 'Dr Nurul Raja', role: 'Physician', id: 'D017' },
            'dr.siti': { password: 'password123', name: 'Dr Siti Lim', role: 'Physician', id: 'D018' },
            'dr.xiaoting': { password: 'password123', name: 'Dr Xiao Ting Goh', role: 'Physician', id: 'D019' },
            'dr.jiaen': { password: 'password123', name: 'Dr Jia En Chen', role: 'Physician', id: 'D020' },
            'dr.lakshmi': { password: 'password123', name: 'Dr Lakshmi Raja', role: 'Physician', id: 'D021' },
            'dr.aisyah': { password: 'password123', name: 'Dr Aisyah Ng', role: 'Physician', id: 'D022' },
            'dr.huimin': { password: 'password123', name: 'Dr Hui Min Lee', role: 'Physician', id: 'D023' },
            'dr.xiufen': { password: 'password123', name: 'Dr Xiu Fen Chua', role: 'Physician', id: 'D024' },
            'admin': { password: 'admin123', name: 'System Admin', role: 'Administrator', id: 'ADMIN' }
        };

        function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            if (!username || !password) {
                errorText.textContent = 'Please enter both username and password.';
                errorMsg.classList.add('show');
                return;
            }

            btn.classList.add('loading');
            btn.disabled = true;
            errorMsg.classList.remove('show');

            setTimeout(() => {
                const user = VALID_CREDENTIALS[username];

                if (user && user.password === password) {
                    const token = btoa(JSON.stringify({
                        doctor_id: user.id,
                        doctor_name: user.name,
                        role: user.role,
                        exp: Date.now() + 3600000
                    }));

                    localStorage.setItem('jwt_token', token);
                    localStorage.setItem('doctor_info', JSON.stringify({
                        id: user.id,
                        name: user.name,
                        role: user.role
                    }));

                    window.location.href = 'dashboard2.html';
                } else {
                    errorText.textContent = 'Invalid username or password. Please try again.';
                    errorMsg.classList.add('show');
                    btn.classList.remove('loading');
                    btn.disabled = false;
                }
            }, 800);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });

        const token = localStorage.getItem('jwt_token');
        if (token) {
            try {
                const decoded = JSON.parse(atob(token));
                if (decoded.exp > Date.now()) {
                    window.location.href = 'dashboard2.html';
                } else {
                    localStorage.removeItem('jwt_token');
                    localStorage.removeItem('doctor_info');
                }
            } catch (e) {
                localStorage.removeItem('jwt_token');
                localStorage.removeItem('doctor_info');
            }
        }
    </script>
</body>
</html>
